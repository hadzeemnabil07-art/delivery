<!-- index.html - Login Page -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>QuickBite - Login</title>
  <!-- Bootstrap 5 CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <div class="container d-flex justify-content-center align-items-center min-vh-100 py-4">
    <div class="col-11 col-sm-8 col-md-6 col-lg-5">
      <div class="card card-shadow p-4 p-md-5">
        <div class="text-center mb-4">
          <i class="bi bi-bag-heart-fill fs-1 text-warning"></i>
          <h2 class="mt-2 fw-bold">QuickBite</h2>
          <p class="text-muted">Login to order delicious food</p>
        </div>
        <form id="loginForm">
          <div class="mb-3">
            <label for="username" class="form-label">Username</label>
            <input type="text" class="form-control form-control-lg" id="username" placeholder="Enter your username">
          </div>
          <div class="mb-4">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control form-control-lg" id="password" placeholder="Enter your password">
          </div>
          <button type="submit" class="btn btn-warning w-100 btn-lg fw-bold">Sign In</button>
        </form>
        <div class="text-center mt-3 small text-muted">
          Demo: any non-empty username & password
        </div>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
